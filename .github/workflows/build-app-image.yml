name: Build and Deploy Application Image

on:
  push:
    branches: [ main, feature/test ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Private Registry
        uses: docker/login-action@v3
        with:
          registry: registry.314ecorp.tech
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      # First build the PHP base image
      - name: Build PHP base image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/library/dockers/dev-php-fpm
          tags: registry.314ecorp.tech/openemr:php-base
          platforms: linux/amd64,linux/arm64
          push: true
          
      # Then build the application image using the PHP base
      - name: Build and push full application image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.simple
          tags: registry.314ecorp.tech/openemr:latest,registry.314ecorp.tech/openemr:${{ github.sha }}
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=registry,ref=registry.314ecorp.tech/openemr:latest
          cache-to: type=inline 